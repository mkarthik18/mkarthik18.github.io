<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Production | Thanitech</title>
    <style>
        /* Dark Theme Styles */
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            color: #00dfd8;
            text-align: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #8b949e;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: #161b22;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            box-sizing: border-box; /* Fixes width issues */
        }

        button.save-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #238636, #2ea043);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* Table Styling */
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }

        th {
            color: #8b949e;
            font-size: 0.9rem;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h2>🥛 Daily Milk Entry</h2>

    <div class="form-container">
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="dateInput">
        </div>

        <div class="form-group">
            <label>Select Cow</label>
            <select id="cowInput">
                <option value="Cow #101 (Lakshmi)">Cow #101 (Lakshmi)</option>
                <option value="Cow #102 (Gauri)">Cow #102 (Gauri)</option>
                <option value="Cow #103">Cow #103</option>
            </select>
        </div>

        <div class="form-group">
            <label>Session</label>
            <select id="sessionInput">
                <option value="Morning">☀️ Morning</option>
                <option value="Evening">🌙 Evening</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantity (Liters)</label>
            <input type="number" id="litersInput" placeholder="e.g. 12.5" step="0.1">
        </div>

        <button class="save-btn" onclick="saveData()">Save Record</button>
    </div>

    <h3>Recent Records</h3>
    <table id="milkTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Cow</th>
                <th>Session</th>
                <th>Liters</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <a href="farm.html" class="back-link">← Back to Dashboard</a>

    <script>
        // Set default date to today
        document.getElementById('dateInput').valueAsDate = new Date();

        function saveData() {
            // 1. Get values from form
            const date = document.getElementById('dateInput').value;
            const cow = document.getElementById('cowInput').value;
            const session = document.getElementById('sessionInput').value;
            const liters = document.getElementById('litersInput').value;

            if(liters === "") {
                alert("Please enter liters!");
                return;
            }

            // 2. Create a new table row
            const table = document.getElementById('milkTable').getElementsByTagName('tbody')[0];
            const newRow = table.insertRow(0); // Insert at top

            newRow.innerHTML = `
                <td>${date}</td>
                <td>${cow}</td>
                <td>${session}</td>
                <td style="color: #00dfd8; font-weight:bold;">${liters} L</td>
            `;

            // 3. Clear the liters input for next entry
            document.getElementById('litersInput').value = "";
            
            // Optional: Save to LocalStorage so it stays after refresh
            // (We can add this logic later if you want)
        }
    </script>

</body>
</html>
