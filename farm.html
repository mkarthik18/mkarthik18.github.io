<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cow Farm Management | Thanitech</title>
    <style>
        /* CSS Styles - Same Dark Tech Theme */
        body {
            margin: 0;
            padding: 20px;
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        h1 {
            background: -webkit-linear-gradient(45deg, #00dfd8, #007cf0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* Grid Layout for Options */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00dfd8;
        }

        .card h3 {
            margin-top: 0;
            color: #c9d1d9;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .back-btn {
            display: inline-block;
            margin-top: 50px;
            color: #8b949e;
            text-decoration: none;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 5px;
        }
        
        .back-btn:hover {
            background-color: #30363d;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🐄 Cow Farm Control Center</h1>

    <div class="dashboard-grid">
        <div class="card" onclick="alert('Module Coming Soon: Live Tracking')">
            <span class="icon">📡</span>
            <h3>Live Tracking</h3>
            <p style="color: #8b949e; font-size: 0.9rem;">GPS & Health Monitoring</p>
        </div>

        <a href="milk.html" style="text-decoration: none; color: inherit;">
            <div class="card">
                <span class="icon">🥛</span>
                <h3>Milk Production</h3>
                <p style="color: #8b949e; font-size: 0.9rem;">Daily Yield Logs</p>
            </div>
        </a>

        <div class="card" onclick="alert('Module Coming Soon: Health Status')">
            <span class="icon">🩺</span>
            <h3>Health Check</h3>
            <p style="color: #8b949e; font-size: 0.9rem;">Vaccination & Vet Visits</p>
        </div>

        <div class="card" onclick="alert('Module Coming Soon: Inventory')">
            <span class="icon">🌾</span>
            <h3>Feed Inventory</h3>
            <p style="color: #8b949e; font-size: 0.9rem;">Stock Levels & Orders</p>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Back to Main Hub</a>

</body>
</html>
